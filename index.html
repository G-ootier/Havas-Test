<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Hasbro — Family Game Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      font-family: 'Fredoka', 'Arial Rounded MT Bold', Arial, sans-serif;
      background-color: #1565C0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.22) 3px, transparent 3px);
      background-size: 28px 28px;
      color:#fff;
      touch-action: none;
    }

    /* ── Scrollable wrapper ── */
    .page {
      display:none;
      position:absolute;
      inset:0;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
    }
    .page.active { display:block; }

    /* ── Desktop screen ── */
    #desktop-screen {
      display:none;
      position:absolute;
      inset:0;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:28px;
      text-align:center;
      padding:40px;
    }
    #desktop-screen.active { display:flex; }
    .qr-wrap {
      background:#fff;
      border-radius:20px;
      padding:16px;
      width:200px; height:200px;
      display:flex; align-items:center; justify-content:center;
    }
    .qr-wrap svg { width:100%; height:100%; }
    #desktop-screen p { color:rgba(255,255,255,0.8); font-size:16px; line-height:1.5; max-width:340px; }

    /* ── Setup screen ── */
    #setup-screen {
      padding: 40px 24px 40px;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100%;
    }
    .setup-hasbro { width:80px; margin-bottom:16px; }
    .setup-title {
      font-size:32px;
      font-weight:700;
      color:#FFD700;
      -webkit-text-stroke:2px #1a1a1a;
      text-align:center;
      margin-bottom:6px;
      line-height:1.1;
    }
    .setup-sub {
      font-size:15px;
      color:rgba(255,255,255,0.8);
      margin-bottom:28px;
      text-align:center;
    }
    .players-list {
      width:100%;
      max-width:360px;
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:20px;
    }
    .player-row {
      display:flex;
      align-items:center;
      gap:10px;
    }
    .player-num {
      width:34px; height:34px;
      background:rgba(255,255,255,0.2);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:16px;
      flex-shrink:0;
    }
    .player-input {
      flex:1;
      background:rgba(255,255,255,0.15);
      border:2px solid rgba(255,255,255,0.3);
      border-radius:50px;
      padding:12px 18px;
      font-size:16px;
      font-family:inherit;
      color:#fff;
      outline:none;
    }
    .player-input::placeholder { color:rgba(255,255,255,0.5); }
    .player-input:focus { border-color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.25); }
    .btn-remove {
      width:34px; height:34px;
      background:rgba(230,57,70,0.7);
      border:none; border-radius:50%;
      color:#fff; font-size:20px; line-height:1;
      cursor:pointer;
      flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .btn-add {
      width:100%; max-width:360px;
      padding:13px;
      background:rgba(255,255,255,0.15);
      border:2px dashed rgba(255,255,255,0.4);
      border-radius:50px;
      color:#fff; font-size:16px; font-family:inherit;
      cursor:pointer;
      margin-bottom:24px;
    }
    .btn-start {
      width:100%; max-width:360px;
      padding:18px;
      background:linear-gradient(135deg, #E53935, #B71C1C);
      border:none; border-radius:50px;
      color:#fff; font-size:20px; font-weight:700;
      font-family:inherit; text-transform:uppercase;
      letter-spacing:1px;
      box-shadow:0 6px 20px rgba(0,0,0,0.3);
      cursor:pointer;
    }
    .btn-start:disabled {
      background:rgba(255,255,255,0.2);
      box-shadow:none;
      color:rgba(255,255,255,0.4);
    }

    /* ── Game select ── */
    #games-screen {
      padding: 24px 16px 32px;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100%;
    }
    .top-bar {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }
    .hasbro-logo { height:52px; }
    .btn-players {
      background:rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.4);
      border-radius:50px;
      padding:8px 16px;
      color:#fff; font-size:13px; font-family:inherit;
      cursor:pointer;
    }
    .hero-title {
      font-size:38px;
      font-weight:700;
      color:#FFD700;
      -webkit-text-stroke:2.5px #1a1a1a;
      text-align:center;
      line-height:1;
      margin-bottom:4px;
      text-transform:uppercase;
    }
    .hero-sub {
      font-size:14px;
      color:rgba(255,255,255,0.75);
      margin-bottom:20px;
      text-align:center;
    }
    .players-chips {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin-bottom:24px;
    }
    .chip {
      background:rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.35);
      border-radius:50px;
      padding:6px 14px;
      font-size:14px;
      font-weight:600;
    }

    .games-grid {
      width:100%;
      max-width:420px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }
    .game-card {
      border-radius:20px;
      overflow:hidden;
      cursor:pointer;
      position:relative;
      aspect-ratio:3/2;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:transform 0.15s;
      box-shadow:0 6px 20px rgba(0,0,0,0.35);
    }
    .game-card:active { transform:scale(0.95); }
    .game-card img {
      max-width:80%;
      max-height:65%;
      object-fit:contain;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
    .game-card .card-label {
      position:absolute;
      bottom:8px;
      left:0; right:0;
      text-align:center;
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      opacity:0.8;
    }
    .game-card.coming-soon { opacity:0.5; cursor:default; }
    .game-card.coming-soon::after {
      content:'COMING SOON';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      letter-spacing:1px;
      border-radius:20px;
    }

    /* card backgrounds */
    .card-twister  { background:linear-gradient(135deg,#e63946,#c1121f); }
    .card-connect4 { background:linear-gradient(135deg,#1a1a1a,#3a3a3a); }
    .card-cluedo   { background:linear-gradient(135deg,#6a0dad,#4a148c); }
    .card-operation{ background:linear-gradient(135deg,#e65100,#bf360c); }
    .card-monopoly { background:linear-gradient(135deg,#c62828,#e65100); }

    /* game-card spanning full width (Twister = featured) */
    .game-card-wide {
      grid-column: span 2;
      aspect-ratio:16/7;
    }

    .operation-text {
      font-size:28px;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,0.5);
      letter-spacing:1px;
    }
  </style>
</head>

  <script src="shared.js"></script>
  <script>
    // ── Boot ──────────────────────────────────────────────
    function boot() {
      if (!HG.isMobile()) {
        document.getElementById('desktop-screen').classList.add('active');
        return;
      }
      if (HG.hasPlayers()) {
        showGames();
      } else {
        showSetup();
      }
    }

    // ── Setup ─────────────────────────────────────────────
    function showSetup() {
      document.getElementById('games-page').classList.remove('active');
      document.getElementById('setup-page').classList.add('active');
      renderSetupRows();
    }

    var playerCount = 2;

    function renderSetupRows() {
      var list = document.getElementById('players-list');
      while (list.firstChild) list.removeChild(list.firstChild);

      for (var i = 0; i < playerCount; i++) {
        (function(idx) {
          var row = document.createElement('div');
          row.className = 'player-row';

          var num = document.createElement('div');
          num.className = 'player-num';
          num.textContent = idx + 1;

          var input = document.createElement('input');
          input.className = 'player-input';
          input.type = 'text';
          input.placeholder = 'Player ' + (idx + 1);
          input.maxLength = 16;
          input.id = 'p-' + idx;
          input.addEventListener('input', validateSetup);

          row.appendChild(num);
          row.appendChild(input);

          if (playerCount > 1) {
            var del = document.createElement('button');
            del.className = 'btn-remove';
            del.textContent = '×';
            del.addEventListener('click', function() {
              playerCount--;
              renderSetupRows();
            });
            row.appendChild(del);
          }

          list.appendChild(row);
        })(i);
      }

      document.getElementById('btn-add-player').style.display = playerCount >= 8 ? 'none' : 'block';
      validateSetup();
    }

    function validateSetup() {
      var filled = 0;
      for (var i = 0; i < playerCount; i++) {
        var el = document.getElementById('p-' + i);
        if (el && el.value.trim().length > 0) filled++;
      }
      document.getElementById('btn-start-session').disabled = filled < 1;
    }

    document.getElementById('btn-add-player').addEventListener('click', function() {
      if (playerCount < 8) { playerCount++; renderSetupRows(); }
    });

    document.getElementById('btn-start-session').addEventListener('click', function() {
      var names = [];
      for (var i = 0; i < playerCount; i++) {
        var el = document.getElementById('p-' + i);
        var name = el ? el.value.trim() : '';
        if (name) names.push(name);
        else names.push('Player ' + (i + 1));
      }
      HG.setPlayers(names);
      showGames();
    });

    // ── Games ─────────────────────────────────────────────
    function showGames() {
      document.getElementById('setup-page').classList.remove('active');
      document.getElementById('games-page').classList.add('active');
      renderChips();
    }

    function renderChips() {
      var chips = document.getElementById('players-chips');
      while (chips.firstChild) chips.removeChild(chips.firstChild);
      HG.getPlayers().forEach(function(name) {
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = name;
        chips.appendChild(chip);
      });
    }

    document.getElementById('btn-change-players').addEventListener('click', function() {
      playerCount = Math.max(HG.getPlayers().length, 2);
      showSetup();
      // Pre-fill existing names
      var players = HG.getPlayers();
      players.forEach(function(name, i) {
        var el = document.getElementById('p-' + i);
        if (el) el.value = name;
      });
      validateSetup();
    });

    // ── Navigate ──────────────────────────────────────────
    function goTo(url) {
      window.location.href = url;
    }

    boot();
  </script>
</body>
</html>
